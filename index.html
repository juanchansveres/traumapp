<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://accounts.google.com/gsi/client" async defer></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TraumApp</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f8fa;--white:#ffffff;--s2:#f0f2f5;--s3:#e8eaed;
  --border:#dde1e7;--border2:#c8cdd5;
  --acc:#1a6b4a;--acc2:#145c3e;--acc-light:#e8f5ee;--acc-mid:#b8dfc9;
  --gold:#b07d12;--gold-bg:#fef9ec;--gold-border:#f0d080;
  --red:#c0392b;--red-bg:#fdf2f0;
  --blue:#1a5fa8;--blue-bg:#eef4fc;
  --text:#1a1d23;--mid:#4a5568;--muted:#8a93a2;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 4px 24px rgba(0,0,0,.12);
  --r:14px;--rs:9px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;overflow:hidden}
input,textarea,select{font-family:'Inter',sans-serif}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100dvh}
#header{height:56px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.h-logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--acc);flex:1}
.h-logo em{font-style:italic;color:var(--muted)}
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#page{max-width:720px;margin:0 auto;padding:22px 16px 90px}

/* ── BOTTOM NAV ── */
#bnav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);height:66px;display:flex;z-index:80;box-shadow:0 -2px 12px rgba(0,0,0,.07)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:10px;font-weight:600;color:var(--muted);transition:all .18s;padding:6px 4px;letter-spacing:.3px;text-transform:uppercase;border-top:3px solid transparent}
.bn.active{color:var(--acc);background:var(--acc-light);border-top:3px solid var(--acc);border-radius:0}
.bn-ico{font-size:22px;line-height:1}

/* ── CARDS ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card.tap{cursor:pointer;transition:box-shadow .18s,transform .12s}
.card.tap:hover{box-shadow:var(--shadow-lg)}
.card.tap:active{transform:scale(.99)}

/* ── HOME ── */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.home-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:20px 14px 16px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
.home-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.home-card:active{transform:scale(.97)}
.home-card .hc-ico{font-size:44px;line-height:1}
.home-card .hc-lbl{font-size:14px;font-weight:700;color:var(--text)}
.home-card .hc-sub{font-size:11px;color:var(--muted)}
.home-card.acc{background:linear-gradient(135deg,var(--acc),var(--acc2));border-color:var(--acc2)}
.home-card.acc .hc-lbl,.home-card.acc .hc-sub{color:rgba(255,255,255,.92)}

/* ── SEARCH ── */
.search-bar{position:relative;margin-bottom:18px}
.search-bar input{width:100%;padding:13px 18px 13px 46px;background:var(--white);border:1.5px solid var(--border);border-radius:50px;font-size:15px;color:var(--text);outline:none;box-shadow:var(--shadow);transition:border-color .2s}
.search-bar input:focus{border-color:var(--acc)}
.search-bar .si{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:17px;pointer-events:none}

/* ── FIELDS ── */
.field{margin-bottom:14px}
.field>label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:10px 13px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:14px;outline:none;transition:border-color .18s;-webkit-appearance:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-light)}
.field textarea{resize:vertical;min-height:88px;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--rs);border:none;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-acc{background:var(--acc);color:#fff;width:100%;font-size:15px;padding:13px}
.btn-acc:hover{background:var(--acc2)}
.btn-acc:active{transform:scale(.98)}
.btn-ghost{background:var(--s2);color:var(--mid);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--s3);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(192,57,43,.2)}
.btn-blue{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(26,95,168,.2)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.b-green{background:var(--acc-light);color:var(--acc);border:1px solid var(--acc-mid)}
.b-gold{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-border)}
.b-gray{background:var(--s2);color:var(--muted);border:1px solid var(--border)}
.b-blue{background:var(--blue-bg);color:var(--blue)}

/* ── NOTICES ── */
.notice{border-radius:var(--rs);padding:11px 14px;margin-bottom:12px;font-size:13px;line-height:1.6;display:flex;gap:9px;align-items:flex-start}
.n-info{background:var(--blue-bg);border:1px solid #b8d4f0;color:var(--blue)}
.n-warn{background:var(--gold-bg);border:1px solid var(--gold-border);color:var(--gold)}
.n-ok{background:var(--acc-light);border:1px solid var(--acc-mid);color:var(--acc)}

/* ── SECTION HEADER ── */
.pg-title{font-family:'DM Serif Display',serif;font-size:25px;margin-bottom:3px;color:var(--text)}
.pg-sub{font-size:13px;color:var(--muted);margin-bottom:18px}
.back{display:flex;align-items:center;gap:7px;background:none;border:none;color:var(--mid);font-family:'Inter',sans-serif;font-size:14px;cursor:pointer;margin-bottom:16px;font-weight:500;transition:color .15s}
.back:hover{color:var(--acc)}

/* ── PATIENT ── */
.nhc{font-family:'DM Serif Display',serif;font-size:13px;color:var(--acc);font-weight:700;letter-spacing:.4px;margin-bottom:2px}
.p-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted)}

/* ── SEG BUTTONS ── */
.seg-row{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
.seg-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 14px;background:var(--white);border:2px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .18s;font-family:'Inter',sans-serif;min-width:70px}
.seg-btn:hover,.seg-btn.active{border-color:var(--acc);background:var(--acc-light)}
.seg-btn .seg-ico{font-size:22px}
.seg-btn .seg-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.seg-btn.active .seg-lbl{color:var(--acc)}

/* ── UPLOAD ── */
.upload-section{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:10px}
.upload-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mid);margin-bottom:8px}
.upload-btn{display:flex;align-items:center;gap:6px;padding:8px 13px;background:var(--white);border:1.5px dashed var(--border2);border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:500;color:var(--mid);transition:all .18s;flex:1;justify-content:center}
.upload-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-light)}
.upload-btn input{display:none}
.thumb-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.thumb{position:relative;aspect-ratio:1;border-radius:7px;overflow:hidden;background:var(--s3);cursor:pointer;border:1px solid var(--border)}
.thumb img{width:100%;height:100%;object-fit:cover;transition:transform .2s}
.thumb:hover img{transform:scale(1.05)}
.thumb .del{position:absolute;top:3px;right:3px;background:rgba(255,255,255,.9);border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;color:var(--red);font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.thumb:hover .del{opacity:1}
.video-list{display:flex;flex-direction:column;gap:5px}
.video-item{display:flex;align-items:center;gap:9px;background:var(--white);border:1px solid var(--border);border-radius:var(--rs);padding:8px 11px}
.video-loc{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--gold)}

/* ── EDITABLE ── */
.editable-view{display:flex;align-items:flex-start;gap:8px;cursor:pointer;padding:7px 9px;border-radius:var(--rs);border:1.5px dashed transparent;transition:border-color .15s,background .15s;min-height:34px}
.editable-view:hover{border-color:var(--border2);background:var(--s2)}
.editable-val{flex:1;font-size:13px;line-height:1.75;color:var(--text);word-break:break-word}
.edit-pencil{background:none;border:none;cursor:pointer;font-size:13px;flex-shrink:0;opacity:0;transition:opacity .15s;padding:0}
.editable-view:hover .edit-pencil{opacity:1}
.editable-edit{padding:4px 0}

/* ── SAT ── */
.sat-opt{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--rs);cursor:pointer;margin-bottom:5px;transition:all .15s}

/* ── CONSULT CARD ── */
.consult-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}

/* ── PATHOLOGY ACCORDION ── */
.patho-group{border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.patho-header{display:flex;align-items:center;gap:10px;padding:13px 15px;background:var(--white);cursor:pointer;user-select:none;transition:background .15s}
.patho-header:hover{background:var(--s2)}
.patho-header.has-sel{background:var(--acc-light);border-bottom:1.5px solid var(--acc-mid)}
.patho-ico{font-size:22px;flex-shrink:0}
.patho-name{font-size:14px;font-weight:700;flex:1}
.patho-count{font-size:11px;font-weight:700;color:var(--acc);background:var(--acc-light);border:1px solid var(--acc-mid);border-radius:20px;padding:2px 8px}
.patho-arrow{font-size:12px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.patho-arrow.open{transform:rotate(90deg)}
.patho-body{display:none;padding:10px;background:var(--s2);border-top:1px solid var(--border)}
.patho-body.open{display:block}
.tec-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--rs);cursor:pointer;transition:all .15s;margin-bottom:6px;font-size:13px}
.tec-opt:last-child{margin-bottom:0}
.tec-opt.sel{background:var(--acc-light);border-color:var(--acc-mid);color:var(--acc);font-weight:600}
.tec-opt input{width:16px;height:16px;accent-color:var(--acc);flex-shrink:0}

/* ── MATERIAL HIERARCHY ── */
.mat-cat-block{border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.mat-cat-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--white);cursor:pointer;user-select:none;transition:background .15s}
.mat-cat-hdr:hover{background:var(--s2)}
.mat-cat-ico{font-size:20px;flex-shrink:0}
.mat-cat-name{font-size:14px;font-weight:700;flex:1}
.mat-cat-arrow{font-size:12px;color:var(--muted);transition:transform .2s}
.mat-cat-arrow.open{transform:rotate(90deg)}
.mat-cat-body{display:none;background:var(--s2)}
.mat-cat-body.open{display:block}

.mat-brand-block{border-bottom:1px solid var(--border)}
.mat-brand-hdr{display:flex;align-items:center;gap:9px;padding:10px 18px;cursor:pointer;background:var(--white);transition:background .15s}
.mat-brand-hdr:hover{background:var(--s3)}
.mat-brand-name{font-size:13px;font-weight:600;flex:1}
.mat-brand-arrow{font-size:11px;color:var(--muted);transition:transform .2s}
.mat-brand-arrow.open{transform:rotate(90deg)}
.mat-brand-body{display:none;padding:8px 12px;background:var(--bg)}
.mat-brand-body.open{display:block}

.mat-type-block{margin-bottom:6px}
.mat-type-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--white);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;transition:background .15s}
.mat-type-hdr:hover{background:var(--s2)}
.mat-type-name{font-size:13px;font-weight:600;flex:1}
.mat-type-arrow{font-size:10px;color:var(--muted);transition:transform .2s}
.mat-type-arrow.open{transform:rotate(90deg)}
.mat-type-body{display:none;padding:6px 8px;background:var(--s2);border-radius:0 0 var(--rs) var(--rs)}
.mat-type-body.open{display:block}

.mat-item-row{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--white);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:5px;cursor:pointer;transition:all .15s}
.mat-item-row.sel{background:var(--acc-light);border-color:var(--acc-mid)}
.mat-item-row:last-child{margin-bottom:0}
.mat-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mat-check.done{background:var(--acc);border-color:var(--acc)}
.mat-item-info{flex:1}
.mat-item-name{font-size:13px;font-weight:500}
.mat-item-sub{font-size:11px;color:var(--muted);margin-top:1px}
.mat-item-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0}

/* ── SETTINGS ── */
.set-section{margin-bottom:22px}
.set-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;padding-left:2px}
.set-item{display:flex;align-items:center;gap:11px;padding:13px 15px;background:var(--white);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:6px;box-shadow:var(--shadow)}
.set-item-ico{font-size:20px;flex-shrink:0}
.set-item-info{flex:1}
.set-item-name{font-size:14px;font-weight:600}
.set-item-sub{font-size:11px;color:var(--muted);margin-top:1px}

/* ── INCLUSION OPTIONS ── */
.inc-opt{display:flex;align-items:center;gap:13px;padding:16px 15px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .18s;margin-bottom:9px;box-shadow:var(--shadow)}
.inc-opt:hover{border-color:var(--acc);background:var(--acc-light)}
.inc-opt:active{transform:scale(.98)}
.inc-opt .io-ico{font-size:30px;width:44px;text-align:center;flex-shrink:0}

/* ── INFO BLOCK ── */
.info-block{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.info-row{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.ik{font-size:12px;color:var(--muted);width:120px;flex-shrink:0;padding-top:2px;font-weight:500}
.iv{font-size:13px;color:var(--text);flex:1;line-height:1.65}
.elapsed{font-family:'DM Serif Display',serif;font-size:13px;color:var(--gold);margin-left:6px}

/* ── LIGHTBOX / MODAL / TOAST ── */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;align-items:center;justify-content:center;cursor:zoom-out}
#lightbox.open{display:flex}
#lightbox img{max-width:95vw;max-height:90vh;border-radius:8px;object-fit:contain}
#lb-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.2);border:none;color:white;border-radius:50%;width:36px;height:36px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
#modal.open{display:flex}
#modal-box{background:var(--white);border-radius:20px 20px 0 0;padding:22px 18px;width:100%;max-height:88vh;overflow-y:auto;animation:slideUp .22s ease}
@media(min-width:641px){#modal{align-items:center}#modal-box{border-radius:20px;max-width:520px;max-height:90vh}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.anim{animation:fadeUp .22s ease both}
#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--acc);color:#fff;padding:10px 22px;border-radius:28px;font-size:13px;font-weight:700;opacity:0;transition:all .28s;pointer-events:none;z-index:400;white-space:nowrap;box-shadow:var(--shadow-lg)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── FEATURED PHOTO ── */
.thumb.featured{border:2.5px solid var(--gold);box-shadow:0 0 0 2px var(--gold-bg)}
.thumb .feat-btn{position:absolute;bottom:3px;left:3px;background:rgba(255,255,255,.88);border:none;border-radius:20px;padding:2px 6px;cursor:pointer;font-size:10px;font-weight:700;opacity:0;transition:opacity .15s;color:var(--gold)}
.thumb:hover .feat-btn{opacity:1}
.thumb.featured .feat-btn{opacity:1;background:var(--gold);color:#fff}
.thumb .feat-star{position:absolute;top:3px;left:3px;font-size:14px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
/* ── STATUS BADGES ── */
.b-status-pending{background:#f0f2f5;color:#6b7280;border:1px solid #d1d5db}
.b-status-waiting{background:#fff7ed;color:#c2770a;border:1px solid #fed7aa}
.b-status-operated{background:var(--acc-light);color:var(--acc);border:1px solid var(--acc-mid)}
/* ── PATIENT CARD FEATURED IMG ── */
.p-featured-img{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;border:2px solid var(--gold);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.thumb.resumen{border:2.5px solid var(--blue)}
.thumb .res-btn{position:absolute;bottom:3px;right:28px;background:rgba(255,255,255,.88);border:none;border-radius:20px;padding:2px 6px;cursor:pointer;font-size:10px;font-weight:700;opacity:0;transition:opacity .15s;color:var(--blue)}
.thumb:hover .res-btn{opacity:1}
.thumb.resumen .res-btn{opacity:1;background:var(--blue);color:#fff}
.thumb .res-star{position:absolute;bottom:3px;left:3px;font-size:12px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
.p-resumen-strip{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.p-resumen-thumb{width:44px;height:44px;border-radius:7px;object-fit:cover;border:2px solid var(--blue);cursor:pointer;transition:transform .18s;position:relative}
/* Resumen hover zoom — done via JS tooltip overlay for cross-browser reliability */
#resumen-zoom{position:fixed;z-index:500;pointer-events:none;border-radius:12px;border:3px solid var(--blue);box-shadow:0 8px 32px rgba(0,0,0,.28);object-fit:cover;opacity:0;transition:opacity .18s;background:#000}
#resumen-zoom.visible{opacity:1}


/* ── RTE ── */
.rte-wrap{border:1.5px solid var(--border);border-radius:var(--rs);overflow:hidden;background:var(--white)}
.rte-wrap:focus-within{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-light)}
.rte-toolbar{display:flex;gap:2px;padding:6px 8px;background:var(--s2);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.rte-btn{background:none;border:1px solid transparent;border-radius:5px;padding:4px 9px;cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;color:var(--mid);transition:all .15s;line-height:1}
.rte-btn:hover{background:var(--white);border-color:var(--border)}
.rte-divider{width:1px;height:20px;background:var(--border);margin:0 4px;display:inline-block}

function elapsed(d){
  if(!d)return null;
  const days=Math.floor((new Date()-new Date(d))/86400000);
  if(days<0)return null;if(days===0)return'Hoy';if(days<30)return days+'d';
  const m=Math.floor(days/30.44),r=Math.round(days-m*30.44);
  if(m>=12){const y=Math.floor(m/12),mo=m%12;return y+'a'+(mo?' '+mo+'m':'')+(r?' '+r+'d':'')}
  return m+'m'+(r?' '+r+'d':'');
}
function elapsedBetween(d1,d2){
  if(!d1||!d2)return null;
  const days=Math.floor((new Date(d2)-new Date(d1))/86400000);
  if(days<0)return null;if(days===0)return'Día de la cirugía';
  if(days<30)return days+' días postcirugía';
  const m=Math.floor(days/30.44),r=Math.round(days-m*30.44);
  return m+'m'+(r?' '+r+'d':'')+' postcirugía';
}

let _view='home';
function nav(v,extra){
  _view=v;
  document.querySelectorAll('.bn').forEach(b=>b.classList.remove('active'));
  const map={home:'bn-home',pacientes:'bn-pacientes',material:'bn-material',ajustes:'bn-ajustes'};
  const roots=['home','pacientes','material','ajustes'];
  const rootKey=roots.find(r=>v===r||v.startsWith(r+'-'))||'home';
  document.getElementById(map[rootKey])?.classList.add('active');
  if(v==='home')renderHome();
  else if(v==='pacientes')renderPacientes();
  else if(v==='detalle')renderDetalle(extra);
  else if(v==='pre')renderPre(extra);
  else if(v==='cirugia-form')renderCirugiaForm(extra);
  else if(v==='consulta-form')renderConsultaForm(extra,null);
  else if(v==='material')renderMaterial();
  else if(v==='ajustes')renderAjustes(extra);
}

const _mm={};const _mmCb={};
function mmInit(k,data){_mm[k]={photos:[...(data?.photos||[])],videos:[...(data?.videos||[])]}}
function mmReg(k,cb){_mmCb[k]=cb}
function mmSave(k){if(_mmCb[k])_mmCb[k](_mm[k])}
function mmAddPhotos(k,input){
  if(!_mm[k])_mm[k]={photos:[],videos:[]};const files=Array.from(input.files);let n=0;
  files.forEach(f=>{const r=new FileReader();r.onload=e=>{_mm[k].photos.push({name:f.name,dataUrl:e.target.result,caption:''});n++;if(n===files.length){mmSave(k);mmRefP(k)}};r.readAsDataURL(f)});
  input.value='';
}
function mmAddVideos(k,input){
  if(!_mm[k])_mm[k]={photos:[],videos:[]};
  if(!_mm[k].videos)_mm[k].videos=[];
  Array.from(input.files).forEach(function(f){
    _mm[k].videos.push({
      name:f.name,
      size:f.size,
      type:f.type||'video/*',
      date:new Date().toISOString().split('T')[0],
    });
  });
  mmSave(k);mmRefV(k);
  if(input.value!==undefined)input.value='';
  toast('📹 '+input.files.length+' vídeo(s) registrado(s) — mantenlos en el USB/disco externo');
}

// Handle drag-drop of video files onto upload areas
function mmHandleVideoDrop(k,e){
  e.preventDefault();e.stopPropagation();
  var files=Array.from(e.dataTransfer.files).filter(function(f){return f.type.startsWith('video/')});
  if(files.length===0){toast('Arrastra archivos de vídeo');return;}
  if(!_mm[k])_mm[k]={photos:[],videos:[]};
  if(!_mm[k].videos)_mm[k].videos=[];
  files.forEach(function(f){
    _mm[k].videos.push({name:f.name,size:f.size,type:f.type,date:new Date().toISOString().split('T')[0]});
  });
  mmSave(k);mmRefV(k);
  toast('📹 '+files.length+' vídeo(s) registrado(s) — mantenlos en el USB');
}
function mmDelPhoto(k,i){_mm[k].photos.splice(i,1);mmSave(k);mmRefP(k)}
function mmDelVideo(k,i){_mm[k].videos.splice(i,1);mmSave(k);mmRefV(k)}
function mmRefP(k){
  var el=document.getElementById('mm-p-'+k);if(!el)return;
  el.innerHTML=(_mm[k]&&_mm[k].photos||[]).map(function(ph,i){return mmThumbHtml(k,ph,i)}).join('');
  toast('✓ Foto guardada');
}

function mmToggleFeat(k,i){
  const photos=_mm[k].photos||[];
  const wasF=photos[i]?.featured;
  
  photos.forEach((p,j)=>{ p.featured=(j===i&&!wasF); });
  mmSave(k);
  mmRefP(k);
  toast(wasF?'Portada eliminada':'⭐ Foto establecida como portada');
}

function mmToggleRes(k,i){
  const photos=_mm[k].photos||[];
  if(photos[i]) photos[i].resumen=!photos[i].resumen;
  mmSave(k);
  mmRefP(k);
  toast(photos[i]?.resumen?'📌 Foto añadida al resumen':'Foto eliminada del resumen');
}

function getPatientFeatured(p){
  
  const sections=[p.registro?.pruebas,p.registro?.exploracion,p.cirugia?.imagenes,...(p.consultas||[]).map(c=>c.pruebas),...(p.consultas||[]).map(c=>c.exploracion)];
  for(const sec of sections){
    const feat=(sec?.photos||[]).find(ph=>ph.featured);
    if(feat) return feat.dataUrl;
  }
  return null;
}
function mmRefV(k){
  const el=document.getElementById('mm-v-'+k);if(!el)return;

    var row=document.createElement('div');row.className='video-item';

    var nm=document.createElement('div');nm.style.cssText='font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';nm.textContent=v.name;
    var meta=document.createElement('div');meta.style.cssText='font-size:11px;color:var(--muted);margin-top:2px';

    meta.textContent='📌 USB'+kb+(v.date?' · '+v.date:'');
    info.appendChild(nm);info.appendChild(meta);row.appendChild(info);
    // Play from USB button
    var playBtn=document.createElement('label');playBtn.className='btn btn-ghost btn-sm';playBtn.style.cssText='cursor:pointer;padding:4px 8px;font-size:11px';
    playBtn.title='Selecciona el archivo '+v.name+' desde tu USB para reproducirlo';
    playBtn.textContent='▶ USB';
    var playInp=document.createElement('input');playInp.type='file';playInp.accept='video/*';playInp.style.display='none';
    playInp.onchange=function(){
      var f=playInp.files[0];if(!f)return;
      if(f.name!==v.name){toast('⚠️ El archivo debe llamarse: '+v.name);return;}
      var url=URL.createObjectURL(f);
      openVideoPlayer(url,v.name);
    };
    playBtn.appendChild(playInp);row.appendChild(playBtn);
    var delBtn=document.createElement('button');delBtn.className='btn btn-sm btn-danger';delBtn.style.padding='4px 8px';delBtn.textContent='✕';
    (function(idx2){delBtn.onclick=function(){mmDelVideo(k,idx2)}})(i);
    row.appendChild(delBtn);
    el.appendChild(row);
  });
}

function eStart(id){document.getElementById('ev-'+id).style.display='none';document.getElementById('ee-'+id).style.display='block';document.getElementById('ei-'+id).focus()}

          <div class="tec-opt ${_selTecs.includes(t.id)?'sel':''}" id="to-${t.id}" onclick="toggleTecSel('${patho.id}','${t.id}')">

function togglePatho(pid){
  const body=document.getElementById('pb-'+pid);
  const arrow=document.getElementById('pa-'+pid);
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  arrow.classList.toggle('open',!isOpen);
}

function toggleTecSel(pid,tid){
  const i=_selTecs.indexOf(tid);
  if(i>=0)_selTecs.splice(i,1);else _selTecs.push(tid);
  const opt=document.getElementById('to-'+tid);
  if(opt){opt.classList.toggle('sel',_selTecs.includes(tid));opt.querySelector('input').checked=_selTecs.includes(tid)}
  
  const patho=DB.pathologies().find(p=>p.id===pid);
  const selCount=patho?patho.techniques.filter(t=>_selTecs.includes(t.id)).length:0;
  const hdr=document.getElementById('ph-'+pid);
  if(hdr){

  el.textContent=r||'Fecha anterior a la cirugía';

function guardarConsulta(nhc,idx){
  const nhcVal=nhc||document.getElementById('con-nhc').value.trim();
  if(!nhcVal){alert('NHC obligatorio.');return}
  const fecha=document.getElementById('con-fecha').value;
  const p=DB.findByNhc(nhcVal)||newPatient(nhcVal);if(!p.consultas)p.consultas=[];
  const d1=p.cirugia?.fecha?new Date(p.cirugia.fecha):null;
  const days=d1?Math.floor((new Date(fecha)-d1)/86400000):null;
  const entry={fecha,diasPost:days,evol:document.getElementById('con-evol').value.trim(),pruebas:serMM('con-pruebas'),exploracion:serMM('con-exploracion')};
  if(idx!=null)p.consultas[idx]=entry;else p.consultas.push(entry);
  DB.upsert(p);toast('✓ Consulta guardada');setTimeout(()=>nav('detalle',nhcVal),800);
}

function getPatientResumen(p){
  const sections=[p.registro?.pruebas,p.registro?.exploracion,p.cirugia?.imagenes,...(p.consultas||[]).map(c=>c.pruebas),...(p.consultas||[]).map(c=>c.exploracion)];
  const result=[];
  for(const sec of sections){
    (sec?.photos||[]).filter(ph=>ph.resumen||ph.featured).forEach(ph=>result.push(ph.dataUrl));
  }
  return result.slice(0,6); 
}

function getPatientStatus(p){
  if(p.cirugia?.fecha) return 'operated';
  return p.registro?.listaEspera||'pending';
}

function statusBadge(p){
  const st=getPatientStatus(p);
  if(st==='operated') return '<span class="badge b-status-operated">✅ Operado</span>';
  if(st==='waiting') return '<span class="badge b-status-waiting">🕐 Lista de espera</span>';
  return '<span class="badge b-status-pending">⏳ Pendiente</span>';
}

    list=list.filter(p=>getPatientStatus(p)===_pFilterVal.id);

  if(_pFilterType==='patologia'&&_pFilterVal){
    list=list.filter(p=>(p.registro?.patologias||[]).includes(_pFilterVal.id));

function editCirName(nhc){
  const p=DB.findByNhc(nhc);if(!p?.cirugia)return;
  openModal(`<div style="font-family:'DM Serif Display',serif;font-size:19px;margin-bottom:12px">Editar nombre de cirugía</div>
    <div class="field"><textarea id="edit-cir-name" style="min-height:68px">${p.cirugia.tecnica||''}</textarea></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-acc" style="flex:1" onclick="saveCirName('${nhc}')">Guardar</button>

function saveCirName(nhc){
  const val=document.getElementById('edit-cir-name').value.trim();if(!val)return;

}

function dSeg(seg){
  _dSeg=seg;

}

const _matChecked={};
function renderCatalogCheckable(nhc,catalog){
  return catalog.map(cat=>`
    <div class="mat-cat-block">
      <div class="mat-cat-hdr" onclick="toggleCatBlock('mcat-${cat.id}')">
        <span class="mat-cat-ico">${cat.icon||'📦'}</span>
        ${cat.photo?`<img src="${cat.photo}" style="width:32px;height:32px;border-radius:6px;object-fit:cover;flex-shrink:0" onclick="event.stopPropagation();openLightbox('${cat.photo}')">`:''}
        <span class="mat-cat-name">${cat.name}</span>
        <span class="mat-cat-arrow" id="mcat-${cat.id}-arrow">▶</span>
      </div>
      <div class="mat-cat-body" id="mcat-${cat.id}">
        ${(cat.brands||[]).map(brand=>`
          <div class="mat-brand-block">
            <div class="mat-brand-hdr" onclick="toggleCatBlock('mbrand-${brand.id}')">
              ${brand.photo?`<img src="${brand.photo}" style="width:28px;height:28px;border-radius:5px;object-fit:cover;flex-shrink:0" onclick="event.stopPropagation();openLightbox('${brand.photo}')">`:'<span style="font-size:16px;flex-shrink:0">🏭</span>'}
              <span class="mat-brand-name">${brand.name}</span>
              <span class="mat-brand-arrow" id="mbrand-${brand.id}-arrow">▶</span>
            </div>
            <div class="mat-brand-body" id="mbrand-${brand.id}">
              ${(brand.types||[]).map(type=>`
                <div class="mat-type-block">
                  <div class="mat-type-hdr" onclick="toggleCatBlock('mtype-${type.id}')">
                    ${type.photo?`<img src="${type.photo}" style="width:24px;height:24px;border-radius:4px;object-fit:cover;flex-shrink:0" onclick="event.stopPropagation();openLightbox('${type.photo}')">`:''}
                    <span class="mat-type-name">${type.name}</span>
                    <span class="mat-type-arrow" id="mtype-${type.id}-arrow">▶</span>
                  </div>
                  <div class="mat-type-body" id="mtype-${type.id}">
                    ${(type.items||[]).map(item=>{
                      const key=nhc+'-'+item.id;const done=_matChecked[key]||false;
                      return `<div class="mat-item-row ${done?'sel':''}" id="mitem-${nhc}-${item.id}" onclick="matToggleDet('${nhc}','${item.id}')">
                        <div class="mat-check ${done?'done':''}">${done?'<span style="color:#fff;font-size:12px;font-weight:900">✓</span>':''}</div>
                        <div class="mat-item-info">
                          <div class="mat-item-name" style="text-decoration:${done?'line-through':'none'};color:${done?'var(--muted)':'var(--text)'}">${item.name}</div>
                          ${item.sizes?`<div class="mat-item-sub">${item.sizes}</div>`:''}
                        </div>
                        ${item.photo?`<img src="${item.photo}" class="mat-item-thumb" onclick="event.stopPropagation();openLightbox('${item.photo}')">`:''}
                        ${item.link?`<a href="${item.link}" target="_blank" onclick="event.stopPropagation()" style="font-size:18px;text-decoration:none">🔗</a>`:''}
                      </div>`;
                    }).join('')}
                  </div>
                </div>`).join('')}
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function toggleCatBlock(id){
  var body=document.getElementById(id);var arrow=document.getElementById(id+'-arrow');
  if(!body)return;
  
  if(body.style.display==='none'||body.style.display===''){
    body.style.display='block';
    if(arrow)arrow.textContent='▼';
  } else if(body.style.display==='block'){
    body.style.display='none';
    if(arrow)arrow.textContent='▶';
  } else {
    
    var open=body.classList.toggle('open');
    if(arrow)arrow.classList.toggle('open',open);
  }
}

function matToggleDet(nhc,itemId){
  const key=nhc+'-'+itemId;_matChecked[key]=!_matChecked[key];const done=_matChecked[key];
  const row=document.getElementById('mitem-'+nhc+'-'+itemId);if(!row)return;
  row.classList.toggle('sel',done);
  const chk=row.querySelector('.mat-check');if(chk){chk.className='mat-check'+(done?' done':'');chk.innerHTML=done?'<span style="color:#fff;font-size:12px;font-weight:900">✓</span>':''}
  const nm=row.querySelector('.mat-item-name');if(nm){nm.style.textDecoration=done?'line-through':'none';nm.style.color=done?'var(--muted)':'var(--text)'}
}

function resetMatDet(nhc){
  Object.keys(_matChecked).filter(k=>k.startsWith(nhc+'-')).forEach(k=>delete _matChecked[k]);
  dSeg('mat');
}

function exportarMaterialDet(nhc){
  const p=DB.findByNhc(nhc);if(!p)return;
  const pathos=DB.pathologies();
  const selTecIds=p.registro?.tecnicas||[];
  const selNames=selTecIds.flatMap(tid=>pathos.flatMap(p=>p.techniques).filter(t=>t.id===tid).map(t=>t.name));
  const catalog=DB.catalog();
  let txt=`LISTA DE MATERIAL QUIRÚRGICO\n${'='.repeat(42)}\nNHC: ${nhc}\nFecha cirugía: ${p.cirugia?.fecha||'Pendiente'}\nGenerado: ${today()}\n\n`;
  txt+=`TÉCNICAS PREVISTAS:\n${selNames.map(n=>`  • ${n}`).join('\n')}\n\n`;
  txt+=`MATERIAL:\n${'-'.repeat(42)}\n`;
  catalog.forEach(cat=>{
    txt+=`\n[${cat.name.toUpperCase()}]\n`;
    (cat.brands||[]).forEach(brand=>{
      txt+=`  ${brand.name}:\n`;
      (brand.types||[]).forEach(type=>{
        txt+=`    ${type.name}:\n`;
        (type.items||[]).forEach(item=>{
          const done=_matChecked[nhc+'-'+item.id];
          txt+=`      ${done?'[✓]':'[ ]'} ${item.name}${item.sizes?' ('+item.sizes+')':''}\n`;
        });
      });
    });
  });
  txt+=`\n${'='.repeat(42)}\nTraumApp\n`;
  navigator.clipboard.writeText(txt).then(()=>toast('✓ Lista copiada al portapapeles — pégala en Word')).catch(()=>{
    openModal(`<div style="font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:10px">📄 Lista de material</div>

      <button class="btn btn-acc" style="margin-top:10px" onclick="closeModal()">Cerrar</button>`);
  });
}

      editFn:function(){openEditCat(cat.id)},delFn:function(){confirmDelCat(cat.id)},
      addFn:function(e){e.stopPropagation();openAddBrand(cat.id)},addLabel:'+ Casa',
      onToggle:function(){toggleCatBlock('ajcat-'+cat.id)}

}

function buildHdr(opts){
  var hdr=document.createElement('div');
  hdr.className=opts.isBrand?'mat-brand-hdr':'mat-cat-hdr';
  hdr.onclick=opts.onToggle;
  
  var visual=makePhotoOrIcon(opts.photo,opts.icon,'');
  hdr.appendChild(visual);
  var nm=document.createElement('span');nm.className='mat-cat-name';nm.textContent=opts.name;hdr.appendChild(nm);
  var btns=document.createElement('div');btns.style.cssText='display:flex;gap:5px;margin-right:6px';btns.onclick=function(e){e.stopPropagation()};
  var eBtn=document.createElement('button');eBtn.className='btn btn-ghost btn-sm';eBtn.textContent='✏️';eBtn.onclick=opts.editFn;
  var dBtn=document.createElement('button');dBtn.className='btn btn-sm btn-danger';dBtn.textContent='🗑';dBtn.onclick=opts.delFn;
  btns.appendChild(eBtn);btns.appendChild(dBtn);hdr.appendChild(btns);
  var aBtn=document.createElement('button');aBtn.className='btn btn-acc btn-sm';aBtn.textContent=opts.addLabel;aBtn.onclick=opts.addFn;hdr.appendChild(aBtn);
  var arrow=document.createElement('span');arrow.id=opts.arrowId+'-arrow';arrow.textContent='▶';
  arrow.className=opts.isBrand?'mat-brand-arrow':'mat-cat-arrow';
  hdr.appendChild(arrow);
  return hdr;
}

function uid2(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;}return Math.abs(h).toString(36);}

function anchorTypeIcon(name){
  if(name.indexOf('Knotless')>=0)return'🔵';
  if(name.indexOf('All-Suture')>=0)return'🧵';
  if(name.indexOf('Knotted')>=0)return'🔴';
  if(name.indexOf('Ligament')>=0||name.indexOf('ACL')>=0||name.indexOf('PCL')>=0)return'💪';
  if(name.indexOf('Meniscus')>=0)return'⭕';
  if(name.indexOf('Cartilage')>=0)return'🟡';
  if(name.indexOf('Labrum')>=0)return'🫀';
  if(name.indexOf('Positioning')>=0)return'🛋️';
  if(name.indexOf('Visualization')>=0||name.indexOf('Scope')>=0||name.indexOf('Lens')>=0)return'📷';
  if(name.indexOf('Resection')>=0||name.indexOf('Shaver')>=0)return'⚙️';
  if(name.indexOf('COBLATION')>=0)return'⚡';
  if(name.indexOf('Fluid')>=0||name.indexOf('Pump')>=0)return'💧';
  if(name.indexOf('Healing')>=0||name.indexOf('Biologic')>=0||name.indexOf('Advanced')>=0)return'🌱';
  if(name.indexOf('Bone')>=0||name.indexOf('Glenoid')>=0)return'🦴';
  if(name.indexOf('Cannula')>=0||name.indexOf('Portal')>=0)return'🔧';
  if(name.indexOf('Arthroscop')>=0||name.indexOf('Instrument')>=0)return'🔬';
  if(name.indexOf('Suture')>=0&&name.indexOf('Management')>=0)return'🧵';
  if(name.indexOf('Biceps')>=0||name.indexOf('AC Joint')>=0)return'💪';
  return'📁';
}








function photoInputHtml(id,current){
  return `<div style="display:flex;align-items:center;gap:10px;margin-top:6px">
    ${current?`<img src="${current}" style="width:48px;height:48px;border-radius:8px;object-fit:cover;border:1px solid var(--border)" id="ph-prev-${id}">`:'<div id="ph-prev-'+id+'" style="width:48px;height:48px;border-radius:8px;background:var(--s2);border:1px solid var(--border)"></div>'}
    <label class="upload-btn" style="flex:1;font-size:12px;padding:7px 10px">📷 Foto<input type="file" accept="image/*" onchange="previewPhoto('${id}',this)"></label>
  </div>`;
}
function previewPhoto(id,input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{
    document.getElementById('ph-val-'+id).value=e.target.result;
    const prev=document.getElementById('ph-prev-'+id);
    if(prev){prev.outerHTML=`<img src="${e.target.result}" style="width:48px;height:48px;border-radius:8px;object-fit:cover;border:1px solid var(--border)" id="ph-prev-${id}">`}
  };r.readAsDataURL(f);
}

function addTecField(){
  const list=document.getElementById('ph-tecs-list');if(!list)return;
  const i=list.children.length;
  const div=document.createElement('div');div.style.cssText='display:flex;gap:6px;margin-bottom:6px';
  div.innerHTML=`<input type="text" id="pht-${i}" placeholder="Nombre de la técnica" style="flex:1;padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:13px;outline:none"><button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(div);div.querySelector('input').focus();
}
function savePatho(id){
  const name=document.getElementById('ph-nombre').value.trim();if(!name){alert('Nombre obligatorio.');return}
  const icon=document.getElementById('ph-icon').value.trim()||'🦴';
  const tecInputs=document.querySelectorAll('[id^="pht-"]');
  const pathos=DB.pathologies();
  const existing=id?pathos.find(p=>p.id===id):null;
  const techniques=[...tecInputs].filter(i=>i.value.trim()).map((inp,idx)=>{
    
    const existingTec=existing?.techniques?.[idx];
    return {id:existingTec?.id||uid(), name:inp.value.trim(), materials:existingTec?.materials||[]};
  });
  if(id){const i=pathos.findIndex(p=>p.id===id);if(i>=0){pathos[i].name=name;pathos[i].icon=icon;pathos[i].techniques=techniques}}
  else pathos.push({id:uid(),name,icon,techniques});
  DB.savePathologies(pathos);closeModal();toast('✓ Patología guardada');renderAjustesPatologias();
}
function confirmDelPatho(id){openModal(`<h3 style="font-family:'DM Serif Display',serif;margin-bottom:10px">¿Eliminar patología?</h3><p style="font-size:14px;color:var(--mid);margin-bottom:18px;line-height:1.6">Se eliminarán también todas sus técnicas asociadas.</p><div style="display:flex;gap:10px"><button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancelar</button><button class="btn" style="flex:1;background:var(--red);color:white" onclick="delPatho('${id}')">Eliminar</button></div>`)}
function delPatho(id){DB.savePathologies(DB.pathologies().filter(p=>p.id!==id));closeModal();toast('Eliminada');renderAjustesPatologias()}

function doEditItem(catId,brandId,typeId,itemId){
  var c=DB.catalog();var ci=c.findIndex(function(x){return x.id===catId});if(ci<0)return;
  var bi=c[ci].brands.findIndex(function(x){return x.id===brandId});if(bi<0)return;
  var ti=c[ci].brands[bi].types.findIndex(function(x){return x.id===typeId});if(ti<0)return;
  var ii=c[ci].brands[bi].types[ti].items.findIndex(function(x){return x.id===itemId});if(ii<0)return;
  var it=c[ci].brands[bi].types[ti].items[ii];
  it.name=document.getElementById('edit-item-name').value.trim()||it.name;
  it.ref=document.getElementById('edit-item-ref').value.trim();
  it.sizes=document.getElementById('edit-item-sizes').value.trim();
  it.caption=document.getElementById('edit-item-caption').value.trim();
  it.link=document.getElementById('edit-item-link').value.trim();
  it.photo=window._editItemPhotoFn?window._editItemPhotoFn():'';
  DB.saveCatalog(c);closeModal();renderAjustesCatalogo();toast('✓ Guardado');
}

function confirmDelItem(cid,bid,tid,iid){openModal(`<h3 style="font-family:'DM Serif Display',serif;margin-bottom:10px">¿Eliminar ítem?</h3><div style="display:flex;gap:10px;margin-top:14px"><button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancelar</button><button class="btn" style="flex:1;background:var(--red);color:white" onclick="delItem('${cid}','${bid}','${tid}','${iid}')">Eliminar</button></div>`)}
function delItem(cid,bid,tid,iid){const c=DB.catalog();const ci=c.findIndex(x=>x.id===cid);if(ci<0)return;const bi=c[ci].brands.findIndex(b=>b.id===bid);if(bi<0)return;const ti=c[ci].brands[bi].types.findIndex(t=>t.id===tid);if(ti>=0)c[ci].brands[bi].types[ti].items=c[ci].brands[bi].types[ti].items.filter(i=>i.id!==iid);DB.saveCatalog(c);closeModal();toast('Eliminado');renderAjustes()}

function gdriveInit(){
  // Drive auth is handled by initAuth/loginWithGoogle
}

function gdriveToggle(){
  if(GD.token){
    GD.token=null;GD.folderId=null;GD.dataFileId=null;
    localStorage.removeItem(GD.TOKEN_KEY);localStorage.removeItem(GD.FOLDER_ID_KEY);localStorage.removeItem(GD.DATA_FILE_KEY);
    gdriveSetStatus('disconnected','Desconectado','Reconectar');
    toast('Desconectado de Google Drive');
  }else{loginWithGoogle();}
}

function gdriveConnect(){
  gdriveSetStatus('syncing','Conectando con Google…','Cancelar');
  var client=google.accounts.oauth2.initTokenClient({
    client_id: GD.CLIENT_ID,
    scope: GD.SCOPES,
    callback: function(response){
      if(response.error){
        gdriveSetStatus('disconnected','Error al conectar','Conectar');
        toast('❌ Error: '+response.error);
        return;
      }
      GD.token={
        access_token: response.access_token,
        expires_at: Date.now()+(response.expires_in||3600)*1000-60000
      };
      localStorage.setItem(GD.TOKEN_KEY,JSON.stringify(GD.token));
      gdriveSetStatus('connected','Conectado — preparando Drive…','Desconectar');
      gdriveSetupFolder();
    },
  });
  client.requestAccessToken({prompt:'consent'});
}

function gdriveHeaders(){
  return {'Authorization':'Bearer '+GD.token.access_token,'Content-Type':'application/json'};
}

function gdriveSetupFolder(){
  fetch("https://www.googleapis.com/drive/v3/files?q=name%3D'TraumApp'+and+mimeType%3D'application%2Fvnd.google-apps.folder'+and+trashed%3Dfalse&fields=files(id,name)",{
    headers:{'Authorization':'Bearer '+GD.token.access_token}
  }).then(function(r){return r.json()}).then(function(data){
    if(data.files&&data.files.length>0){
      GD.folderId=data.files[0].id;
      localStorage.setItem(GD.FOLDER_ID_KEY,GD.folderId);
      gdriveFindDataFile();
    }else{
      fetch('https://www.googleapis.com/drive/v3/files',{
        method:'POST',
        headers:gdriveHeaders(),
        body:JSON.stringify({name:'TraumApp',mimeType:'application/vnd.google-apps.folder'})
      }).then(function(r){return r.json()}).then(function(f){
        GD.folderId=f.id;
        localStorage.setItem(GD.FOLDER_ID_KEY,GD.folderId);
        gdriveFindDataFile();
      });
    }
  }).catch(function(e){
    gdriveSetStatus('disconnected','Error de conexión','Conectar');
    toast('❌ Error al acceder a Drive');
  });
}

function gdriveFindDataFile(){
  fetch("https://www.googleapis.com/drive/v3/files?q=name%3D'traumapp_data.json'+and+'"+GD.folderId+"'+in+parents+and+trashed%3Dfalse&fields=files(id,name)",{
    headers:{'Authorization':GD.token.access_token?'Bearer '+GD.token.access_token:''}
  }).then(function(r){return r.json()}).then(function(data){
    if(data.files&&data.files.length>0){
      GD.dataFileId=data.files[0].id;
      localStorage.setItem(GD.DATA_FILE_KEY,GD.dataFileId);
      gdriveLoadData();
    }else{
      gdriveSetStatus('connected','Conectado — guardando datos…','Desconectar');
      gdriveSaveData(function(){
        gdriveSetStatus('connected','Conectado a Google Drive ✓','Desconectar');
        toast('☁️ TraumApp conectada a Google Drive');
      });
    }
  });
}

function gdriveSaveData(cb){
  if(!GD.token||GD.syncing)return;
  GD.syncing=true;
  gdriveSetStatus('syncing','Guardando en Drive…','Desconectar');
  var fullCatalog=DB.catalog();
  var userCatalog=fullCatalog.filter(function(c){return c.id!=='cat_smith_nephew';});
  var payload=JSON.stringify({
    patients:DB.patients(),
    pathologies:DB.pathologies(),
    catalog:userCatalog,
    savedAt:new Date().toISOString(),
    version:'11h',
  });
  var blob=new Blob([payload],{type:'application/json'});
  if(GD.dataFileId){
    fetch('https://www.googleapis.com/upload/drive/v3/files/'+GD.dataFileId+'?uploadType=media',{
      method:'PATCH',
      headers:{'Authorization':'Bearer '+GD.token.access_token,'Content-Type':'application/json'},
      body:blob
    }).then(function(){
      GD.syncing=false;
      gdriveSetStatus('connected','Conectado a Google Drive ✓','Desconectar');
      if(cb)cb();
    }).catch(function(){GD.syncing=false;});
  }else if(GD.folderId){
    var meta=JSON.stringify({name:'traumapp_data.json',parents:[GD.folderId]});
    var form=new FormData();
    form.append('metadata',new Blob([meta],{type:'application/json'}));
    form.append('file',blob);

function catSearchAllItems(catalog) {
  
  var favIds = getCatalogFavs();
  var all = [];
  catalog.forEach(function(cat) {
    (cat.brands||[]).forEach(function(br) {
      (br.types||[]).forEach(function(ty) {
        (ty.items||[]).forEach(function(it) {
          all.push({
            item: it,
            cat: cat.name,
            brand: br.name,
            type: ty.name,
            isFav: favIds.indexOf(it.id) >= 0,
          });
        });
      });
    });
  });
  
  all.sort(function(a,b){ return (b.isFav?1:0)-(a.isFav?1:0); });
  return all;
}

function getMatPickerItems(q) {
  var catalog = DB.catalog();
  var favIds = getCatalogFavs();
  var all = [];
  catalog.forEach(function(cat) {
    (cat.brands||[]).forEach(function(br) {
      (br.types||[]).forEach(function(ty) {
        (ty.items||[]).forEach(function(it) {
          all.push({ item: it, isFav: favIds.indexOf(it.id)>=0 });
        });
      });
    });
  });
  
  all.sort(function(a,b){
    if(b.isFav !== a.isFav) return (b.isFav?1:0)-(a.isFav?1:0);
    return a.item.name.localeCompare(b.item.name);
  });
  if (q && q.length >= 1) {
    var ql = q.toLowerCase();
    all = all.filter(function(e){
      return e.item.name.toLowerCase().indexOf(ql)>=0
        || (e.item.ref && e.item.ref.toLowerCase().indexOf(ql)>=0)
        || (e.item.sizes && e.item.sizes.toLowerCase().indexOf(ql)>=0);
    });
  }
  return all.slice(0, 60);
}

function renderMatPickerList(q) {
  var listEl = document.getElementById('mat-picker-list');
  if (!listEl) return;
  listEl.innerHTML = '';
  var items = getMatPickerItems(q);
  if (items.length === 0) {
    listEl.innerHTML = '<div class="cat-sr-empty">Sin resultados</div>';
    return;
  }
  items.forEach(function(e) {
    var it = e.item;
    var isSel = _tecMatSel.indexOf(it.id) >= 0;
    var row = document.createElement('div');
    row.className = 'mat-pick-opt' + (isSel?' selected-opt':'');
    row.id = 'mpo-' + it.id;

    var cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'opt-check'; cb.checked = isSel;

    var nameDiv = document.createElement('div');
    nameDiv.className = 'opt-name' + (e.isFav?' fav-opt':'');
    nameDiv.textContent = (e.isFav ? '⭐ ' : '') + it.name;

    var refSpan = document.createElement('span');
    refSpan.className = 'opt-ref';
    refSpan.textContent = it.ref || '';

    row.appendChild(cb);
    row.appendChild(nameDiv);
    if(it.ref) row.appendChild(refSpan);

    (function(itemId){
      row.onclick = function() {
        var idx = _tecMatSel.indexOf(itemId);
        if (idx >= 0) {
          _tecMatSel.splice(idx, 1);
          row.classList.remove('selected-opt');
          cb.checked = false;
        } else {
          _tecMatSel.push(itemId);
          row.classList.add('selected-opt');
          cb.checked = true;
        }
        renderSelMatList();
      };
    })(it.id);

    listEl.appendChild(row);
  });
}

function renderSelMatList() {
  var listEl = document.getElementById('sel-mat-list');
  if (!listEl) return;
  listEl.innerHTML = '';
  var catalog = DB.catalog();

  if (_tecMatSel.length === 0) {
    var empty = document.createElement('div');
    empty.style.cssText = 'font-size:12px;color:var(--muted);padding:8px 4px';
    empty.textContent = 'Sin material seleccionado aún';
    listEl.appendChild(empty);
    return;
  }

  _tecMatSel.forEach(function(itemId, idx) {
    
    var found = null;
    for(var c of catalog) for(var b of c.brands||[]) for(var t of b.types||[]) for(var it of t.items||[]) if(it.id===itemId){found=it;break}
    if (!found) return;

    var row = document.createElement('div');
    row.className = 'sel-mat-item';
    row.draggable = true;
    row.dataset.id = itemId;
    row.dataset.idx = idx;

    var handle = document.createElement('span');
    handle.className = 'sel-mat-drag'; handle.textContent = '☰';

    var name = document.createElement('div');
    name.className = 'sel-mat-name'; name.textContent = found.name;

    var ref = document.createElement('span');
    ref.className = 'sel-mat-ref'; ref.textContent = found.ref || '';

    var del = document.createElement('button');
    del.className = 'sel-mat-del'; del.textContent = '✕';
    (function(id){ del.onclick = function(){
      _tecMatSel = _tecMatSel.filter(function(x){return x!==id});
      renderSelMatList();
      
      var cb = document.querySelector('#mpo-'+id+' input');
      var ro = document.getElementById('mpo-'+id);
      if(cb) cb.checked = false;
      if(ro) ro.classList.remove('selected-opt');
    }})(itemId);

    row.appendChild(handle); row.appendChild(name); if(found.ref) row.appendChild(ref); row.appendChild(del);

    
    row.addEventListener('dragstart', function(e){
      e.dataTransfer.setData('text/plain', itemId);
      setTimeout(function(){row.classList.add('dragging')}, 0);
    });
    row.addEventListener('dragend', function(){
      row.classList.remove('dragging');
      document.querySelectorAll('.sel-mat-item').forEach(function(el){el.classList.remove('drag-over')});
    });
    row.addEventListener('dragover', function(e){
      e.preventDefault();
      document.querySelectorAll('.sel-mat-item').forEach(function(el){el.classList.remove('drag-over')});
      row.classList.add('drag-over');
    });
    row.addEventListener('drop', function(e){
      e.preventDefault();
      var fromId = e.dataTransfer.getData('text/plain');
      var toId = itemId;
      if (fromId === toId) return;
      var fi = _tecMatSel.indexOf(fromId);
      var ti = _tecMatSel.indexOf(toId);
      if (fi < 0 || ti < 0) return;
      _tecMatSel.splice(fi, 1);
      _tecMatSel.splice(ti, 0, fromId);
      renderSelMatList();
    });

    listEl.appendChild(row);
  });
}

function saveTecMat() {
  var pathos = DB.pathologies();
  var pi = pathos.findIndex(function(p){return p.id===_tecMatPickPhId});
  if (pi < 0) return;
  var ti = (pathos[pi].techniques||[]).findIndex(function(t){return t.id===_tecMatPickTId});
  if (ti < 0) return;
  var tec = pathos[pi].techniques[ti];
  if(_mlListId && tec.materialLists){
    var li=tec.materialLists.findIndex(function(l){return l.id===_mlListId});
    if(li>=0)tec.materialLists[li].items=_tecMatSel.slice();
  } else {
    tec.materials = _tecMatSel.slice();
  }
  DB.savePathologies(pathos);
  closeModal();
  toast('✓ Material guardado');
  
  openTecMatLists(_tecMatPickPhId, _tecMatPickTId);
}

  localStorage.setItem('ta7_fav_folders',JSON.stringify(folders));
}
function getFavFolderUid(){
  return 'ff'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
}


function addFavFolder(name, parentId){
  var folders=getFavFolders();
  folders.push({id:getFavFolderUid(),name:name,parentId:parentId||null,items:[]});
  saveFavFolders(folders);
  return folders;
}

function moveFolderToFolder(srcId, tgtId){
  if(srcId===tgtId)return;
  var folders=getFavFolders();
  // Prevent circular nesting
  function isDescendant(fid, ancestorId){
    var f=folders.find(function(x){return x.id===fid});
    if(!f||!f.parentId)return false;
    if(f.parentId===ancestorId)return true;
    return isDescendant(f.parentId,ancestorId);
  }
  if(isDescendant(tgtId,srcId))return;
  var src=folders.find(function(f){return f.id===srcId});
  if(src)src.parentId=tgtId;
  saveFavFolders(folders);
  renderAjustesFavoritos();
  toast('📁 Carpeta movida');
}


function getFavRootItems(){
  var allFavs=getCatalogFavs();
  var folders=getFavFolders();
  var inFolder=new Set(folders.flatMap(function(f){return f.items||[]}));
  return allFavs.filter(function(id){return !inFolder.has(id)});
}


function moveFavToFolder(itemId, folderId){
  var folders=getFavFolders();
  
  folders.forEach(function(f){f.items=(f.items||[]).filter(function(id){return id!==itemId})});
  
  if(folderId){
    var f=folders.find(function(f){return f.id===folderId});
    if(f)f.items.push(itemId);
  }
  saveFavFolders(folders);
}


function removeFavFromFolders(itemId){
  var folders=getFavFolders();
  folders.forEach(function(f){f.items=(f.items||[]).filter(function(id){return id!==itemId})});
  saveFavFolders(folders);
}

function buildFavFoldersDOM(){
  var body=document.getElementById('fav-folders-body');if(!body)return;body.innerHTML='';
  var catalog=DB.catalog();
  var folders=getFavFolders();
  if(folders.length===0){
    var hint=document.createElement('div');hint.style.cssText='font-size:12px;color:var(--muted);padding:4px 0';
    hint.textContent='Crea carpetas para organizar tus favoritos. Puedes anidar carpetas dentro de otras.';
    body.appendChild(hint);return;
  }
  
  // Build tree: only root folders at top level
  function buildFolderEl(folder, depth){
    depth=depth||0;
    var card=document.createElement('div');
    card.style.cssText='background:var(--white);border:1.5px solid var(--border);border-radius:var(--rs);margin-bottom:6px;overflow:hidden';
    if(depth>0) card.style.marginLeft='16px';
    card.dataset.folderId=folder.id;
    card.dataset.folderDrag='1';
    card.draggable=true;
    
    // Drag folder onto folder
    card.addEventListener('dragstart',function(e){
      e.dataTransfer.setData('folder-drag-id',folder.id);
      e.dataTransfer.setData('drag-type','folder');
      setTimeout(function(){card.style.opacity='0.5'},0);
    });
    card.addEventListener('dragend',function(){card.style.opacity='1'});
    card.addEventListener('dragover',function(e){
      e.preventDefault();e.stopPropagation();
      card.style.borderColor='var(--acc)';
    });
    card.addEventListener('dragleave',function(){card.style.borderColor='var(--border)'});
    card.addEventListener('drop',function(e){
      e.preventDefault();e.stopPropagation();
      card.style.borderColor='var(--border)';
      var dragType=e.dataTransfer.getData('drag-type');
      var itemId=e.dataTransfer.getData('fav-item-id');
      var srcFolderId=e.dataTransfer.getData('folder-drag-id');
      if(dragType==='folder' && srcFolderId && srcFolderId!==folder.id){
        moveFolderToFolder(srcFolderId, folder.id);
      } else if(itemId){
        moveFavToFolder(itemId,folder.id);renderAjustesFavoritos();toast('Movido a '+folder.name);
      }
    });
    
    // Header
    var hdr=document.createElement('div');
    hdr.style.cssText='display:flex;align-items:center;gap:8px;padding:10px 13px;cursor:pointer;background:var(--s2)';
    hdr.onclick=function(){toggleCatBlock('ff-'+folder.id)};
    var ico=document.createElement('span');ico.textContent=depth>0?'📂':'📁';ico.style.fontSize='16px';hdr.appendChild(ico);
    var nm=document.createElement('span');nm.style.cssText='flex:1;font-size:14px;font-weight:700';nm.textContent=folder.name;hdr.appendChild(nm);
    var cnt=document.createElement('span');cnt.style.cssText='font-size:11px;color:var(--muted)';
    var childFolders=folders.filter(function(f){return f.parentId===folder.id});
    var totalItems=(folder.items||[]).length;
    cnt.textContent=(childFolders.length>0?childFolders.length+' subcarpetas · ':'')+totalItems+' ítems';
    hdr.appendChild(cnt);
    
    // Add subfolder button
    var addSubBtn=document.createElement('button');addSubBtn.className='btn btn-ghost btn-sm';addSubBtn.style.cssText='font-size:10px;padding:3px 7px';addSubBtn.textContent='📁+';addSubBtn.title='Nueva subcarpeta';
    (function(pid,pname){addSubBtn.onclick=function(e){e.stopPropagation();
      var nb=prompt('Nombre de subcarpeta dentro de "'+pname+'":');if(!nb||!nb.trim())return;
      addFavFolder(nb.trim(),pid);renderAjustesFavoritos();
    }})(folder.id,folder.name);hdr.appendChild(addSubBtn);
    
    // Rename
    var renBtn=document.createElement('button');renBtn.className='btn btn-ghost btn-sm';renBtn.style.padding='3px 6px';renBtn.textContent='✏️';
    renBtn.onclick=function(e){e.stopPropagation();
      var nb=prompt('Nuevo nombre:', folder.name);if(!nb||!nb.trim())return;
      var f2=getFavFolders();var fi=f2.findIndex(function(f){return f.id===folder.id});
      if(fi>=0)f2[fi].name=nb.trim();saveFavFolders(f2);renderAjustesFavoritos();
    };hdr.appendChild(renBtn);
    // Delete
    var delBtn=document.createElement('button');delBtn.className='btn btn-sm btn-danger';delBtn.style.padding='3px 6px';delBtn.textContent='🗑';
    delBtn.onclick=function(e){e.stopPropagation();
      if(!confirm('¿Eliminar "'+folder.name+'" y sus subcarpetas? Los ítems volverán a Sin carpeta.'))return;
      // Remove this folder and all descendants
      function getAllDescIds(fid){
        var kids=getFavFolders().filter(function(f){return f.parentId===fid}).map(function(f){return f.id});
        return kids.concat(kids.flatMap(getAllDescIds));
      }
      var toRemove=new Set([folder.id].concat(getAllDescIds(folder.id)));
      saveFavFolders(getFavFolders().filter(function(f){return !toRemove.has(f.id)}));
      renderAjustesFavoritos();
    };hdr.appendChild(delBtn);
    var arrow=document.createElement('span');arrow.id='ff-'+folder.id+'-arrow';arrow.style.cssText='font-size:12px;color:var(--muted);margin-left:4px';arrow.textContent='▶';hdr.appendChild(arrow);
    card.appendChild(hdr);
    
    // Items body
    var itemsBody=document.createElement('div');itemsBody.id='ff-'+folder.id;itemsBody.style.cssText='display:none;padding:6px';
    // Direct items
    (folder.items||[]).forEach(function(itemId){
      var f=findItemById(catalog,itemId);if(!f)return;
      itemsBody.appendChild(buildFavItemRow(f.item,f.cat,f.brand,f.type,folder.id));
    });
    // Child folders (nested)
    var childFolderList=folders.filter(function(f){return f.parentId===folder.id});
    childFolderList.forEach(function(child){
      var childEl=buildFolderEl(child, depth+1);
      itemsBody.appendChild(childEl);
    });
    if((folder.items||[]).length===0 && childFolderList.length===0){
      var empty=document.createElement('div');empty.style.cssText='font-size:12px;color:var(--muted);padding:10px;text-align:center';
      empty.textContent='Arrastra implantes o carpetas aquí';itemsBody.appendChild(empty);
    }
    card.appendChild(itemsBody);
    return card;
  }
  
  // Render root folders (parentId is null or undefined)
  var rootFolders=folders.filter(function(f){return !f.parentId});
  if(rootFolders.length===0 && folders.length>0){
    // All folders have parentId — show all
    folders.forEach(function(f){if(!f.parentId)body.appendChild(buildFolderEl(f,0))});
  } else {
    rootFolders.forEach(function(f){body.appendChild(buildFolderEl(f,0))});
  }
}

// ── GOOGLE SIGN-IN + DRIVE AUTH ──────────────────────────
var ALLOWED_EMAIL='juanchansveres@gmail.com';

function onGoogleSignIn(credentialResponse){
  // Called by Google's GSI library with an id_token
  var err = document.getElementById('login-error');
  var spinner = document.getElementById('login-spinner');
  if(spinner) spinner.style.display='block';
  if(err) err.textContent='';

  // Decode the JWT id_token to get email (no server needed)
  try{
    var parts = credentialResponse.credential.split('.');
    var payload = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
    
    if(payload.email !== ALLOWED_EMAIL){
      if(spinner) spinner.style.display='none';
      if(err) err.textContent='Acceso restringido. Solo disponible para el Dr. Juan Chans Veres.';
      return;
    }

    // Email verified — now get an access token for Drive
    // Use the token client with the verified email hint
    var tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GD.CLIENT_ID,
      scope: GD.SCOPES,
      hint: payload.email,
      callback: function(tokenResponse){
        if(tokenResponse.error){
          if(spinner) spinner.style.display='none';
          if(err) err.textContent='Error al obtener acceso a Drive: '+tokenResponse.error;
          return;
        }
        // SUCCESS — we have both identity and Drive access
        GD.token = {
          access_token: tokenResponse.access_token,
          expires_at: Date.now() + (Number(tokenResponse.expires_in)||3600)*1000 - 60000
        };
        localStorage.setItem(GD.TOKEN_KEY, JSON.stringify(GD.token));
        GD.folderId = localStorage.getItem(GD.FOLDER_ID_KEY)||null;
        GD.dataFileId = localStorage.getItem(GD.DATA_FILE_KEY)||null;

        // Hide login screen
        var el = document.getElementById('login-screen');
        if(el){ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);}, 350); }

        // Start Drive
        var bar = document.getElementById('gdrive-bar');
        if(bar) bar.style.display='flex';
        gdriveSetStatus('connected','Conectado — preparando Drive…','Desconectar');
        if(GD.dataFileId){ gdriveLoadData(); }
        else if(GD.folderId){ gdriveFindDataFile(); }
        else{ gdriveSetupFolder(); }
      },
      error_callback: function(e){
        if(spinner) spinner.style.display='none';
        if(err) err.textContent='Error al acceder a Drive. Recarga e inténtalo.';
      }
    });
    // Request token silently (hint avoids account chooser)
    tokenClient.requestAccessToken({prompt: ''});

  }catch(e){
    if(spinner) spinner.style.display='none';
    if(err) err.textContent='Error al procesar credencial. Recarga la página.';
    console.error(e);
  }
}

function initAuth(){
  // Initialize Google Sign-In
  // Check if we have a valid cached token
  var saved = localStorage.getItem(GD.TOKEN_KEY);
  if(saved){
    try{
      var t = JSON.parse(saved);
      if(t.expires_at > Date.now() + 60000){
        // Try to use cached token silently
        fetch('https://www.googleapis.com/oauth2/v2/userinfo',{
          headers:{'Authorization':'Bearer '+t.access_token}
        }).then(function(r){return r.json()}).then(function(info){
          if(info.email === ALLOWED_EMAIL){
            var el = document.getElementById('login-screen');
            if(el) el.remove();
            GD.token = t;
            GD.folderId = localStorage.getItem(GD.FOLDER_ID_KEY)||null;
            GD.dataFileId = localStorage.getItem(GD.DATA_FILE_KEY)||null;
            var bar = document.getElementById('gdrive-bar');
            if(bar) bar.style.display='flex';
            gdriveSetStatus('connected','Conectado a Google Drive','Desconectar');
            if(GD.dataFileId){ gdriveLoadData(); }
            else if(GD.folderId){ gdriveFindDataFile(); }
            else{ gdriveSetupFolder(); }
          } else {
            localStorage.removeItem(GD.TOKEN_KEY);
          }
        }).catch(function(){
          localStorage.removeItem(GD.TOKEN_KEY);
        });
        return;
      }
    }catch(e){}
  }
  localStorage.removeItem(GD.TOKEN_KEY);
  // Login screen is already in HTML, GSI library will render the button
}

    pathos.forEach(function(ph){(ph.techniques||[]).forEach(function(t){
      if(selTecIds.indexOf(t.id)<0 && (!q||t.name.toLowerCase().indexOf(q)>=0))
        results.push({id:t.id,name:t.name,ph:ph});
    })});
    if(results.length===0){
      drop.innerHTML='<div style="padding:12px;font-size:13px;color:var(--muted)">Sin resultados</div>';
    } else {
      results.slice(0,12).forEach(function(res){
        var opt=document.createElement('div');
        opt.style.cssText='display:flex;align-items:center;gap:8px;padding:9px 13px;cursor:pointer;border-bottom:1px solid var(--s2);font-size:13px;transition:background .1s';
        var icon=document.createElement('span');icon.style.fontSize='16px';icon.textContent=res.ph.icon||'🔬';
        var info=document.createElement('div');info.style.flex='1';
        var nm=document.createElement('div');nm.style.fontWeight='600';nm.textContent=res.name;
        var sub=document.createElement('div');sub.style.cssText='font-size:11px;color:var(--muted)';sub.textContent=res.ph.name;
        info.appendChild(nm);info.appendChild(sub);opt.appendChild(icon);opt.appendChild(info);
        opt.onmouseover=function(){opt.style.background='var(--acc-light)'};
        opt.onmouseout=function(){opt.style.background=''};
        (function(r){opt.onmousedown=function(){
          selTecIds.push(r.id);
          var pt=DB.findByNhc(nhc);if(!pt.registro)pt.registro={};
          pt.registro.tecnicas=selTecIds.slice();DB.upsert(pt);
          inp.value='';drop.style.display='none';
          renderSelList();toast('✓ '+r.name+' añadida');
        }})(res);
        drop.appendChild(opt);
      });
    }
    drop.style.display='block';
  };
  inp.onfocus=function(){inp.style.borderColor='var(--acc)';inp.oninput()};
  searchWrap.appendChild(ico);searchWrap.appendChild(inp);searchWrap.appendChild(drop);
  containerEl.appendChild(searchWrap);
}

function openVideoPlayer(url,name){
  var mb=document.getElementById('modal-box');mb.innerHTML='';
  var h=document.createElement('div');h.style.cssText='font-size:15px;font-weight:700;margin-bottom:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';h.textContent='▶ '+name;mb.appendChild(h);
  var vid=document.createElement('video');
  vid.src=url;vid.controls=true;vid.autoplay=true;
  vid.style.cssText='width:100%;border-radius:10px;max-height:60vh;background:#000';
  vid.onended=function(){URL.revokeObjectURL(url)};
  mb.appendChild(vid);
  var closeBtn=document.createElement('button');closeBtn.className='btn btn-ghost';closeBtn.style.cssText='width:100%;margin-top:10px';closeBtn.textContent='Cerrar';
  closeBtn.onclick=function(){vid.pause();URL.revokeObjectURL(url);closeModal()};
  mb.appendChild(closeBtn);
  document.getElementById('modal').classList.add('open');
}

function mmPlayFromUSB(input, expectedName){
  var f = input.files[0]; if(!f) return;
  if(f.name !== expectedName){
    toast('⚠️ Nombre incorrecto. Busca: ' + expectedName);
    input.value = '';
    return;
  }
  var url = URL.createObjectURL(f);
  openVideoPlayer(url, f.name);
  input.value = '';
}

(function(){
  const zoom=document.getElementById('resumen-zoom');
  let hideTimer=null;

  function showZoom(img,src){
    clearTimeout(hideTimer);
    zoom.src=src;
    const size=Math.min(window.innerWidth*0.55, 240);
    zoom.style.width=size+'px';
    zoom.style.height=size+'px';
    positionZoom(img);
    zoom.classList.add('visible');
  }
  function hideZoom(){
    hideTimer=setTimeout(()=>{
      zoom.classList.remove('visible');
      zoom.src='';
    },80);
  }
  function positionZoom(img){
    const r=img.getBoundingClientRect();
    const size=parseInt(zoom.style.width)||220;
    let top=r.top-size-10;
    let left=r.left+(r.width/2)-(size/2);
    if(top<8){top=r.bottom+10;}
    if(left<8)left=8;
    if(left+size>window.innerWidth-8)left=window.innerWidth-size-8;
    zoom.style.top=top+'px';
    zoom.style.left=left+'px';
  }

  
  document.addEventListener('mouseover',e=>{
    const t=e.target.closest('.p-resumen-thumb');
    if(t&&t.src) showZoom(t,t.src);
  });
  document.addEventListener('mouseout',e=>{
    if(e.target.closest('.p-resumen-thumb')) hideZoom();
  });
  
  document.addEventListener('touchstart',e=>{
    const t=e.target.closest('.p-resumen-thumb');
    if(t&&t.src){e.preventDefault();showZoom(t,t.src);}
  },{passive:false});
  document.addEventListener('touchend',e=>{
    if(e.target.closest('.p-resumen-thumb')) hideZoom();
  });
})();
</script>
